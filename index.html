<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#f7f5f0" />
  <title>PurePixel-Pro</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap');

    :root{
      --bg:#f7f5f0;
      --surface:rgba(255,255,255,.64);
      --surface-2:rgba(255,255,255,.42);
      --line:rgba(20,20,30,.07);
      --line-2:rgba(20,20,30,.05);
      --text:#1b2230;
      --muted:#6f7484;
      --accent:#e6b27a;
      --accent-2:#f6d9b0;
      --shadow:0 24px 70px rgba(26,30,40,.09);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      width:100%;
      height:100%;
      overflow:hidden;
      touch-action:none;
      user-select:none;
      -webkit-user-select:none;
      font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:radial-gradient(circle at top, #fffdf9 0%, #f5f1e8 42%, #ece7dd 100%);
      color:var(--text);
    }

    .page{
      display:none;
      width:100%;
      height:100dvh;
      min-height:100vh;
      position:relative;
      overflow:hidden;
      border-radius:0 !important;
    }

    .page.active{
      display:flex;
      flex-direction:column;
    }

    .page::before{
      content:"";
      position:absolute;
      inset:-20%;
      background:
        radial-gradient(circle at 18% 18%, rgba(230,178,122,.14), transparent 24%),
        radial-gradient(circle at 78% 22%, rgba(204,182,255,.12), transparent 22%),
        radial-gradient(circle at 52% 84%, rgba(246,217,176,.18), transparent 28%);
      filter:blur(16px);
      pointer-events:none;
    }

    .loading-overlay{
      display:none;
      position:fixed;
      inset:0;
      z-index:1000;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      background:rgba(248,246,241,.76);
      backdrop-filter:blur(22px) saturate(1.05);
      -webkit-backdrop-filter:blur(22px) saturate(1.05);
    }
    .loading-overlay.show{display:flex;}

    .spinner{
      width:56px;
      height:56px;
      border-radius:50%;
      border:3px solid rgba(20,20,30,.08);
      border-top-color:var(--accent);
      animation:spin .8s linear infinite;
      margin-bottom:18px;
      box-shadow:0 0 0 10px rgba(255,255,255,.14);
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    .loading-text{
      font-size:20px;
      font-weight:800;
      letter-spacing:-.4px;
      background:linear-gradient(135deg,var(--text),var(--accent));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }
    .loading-sub{
      margin-top:6px;
      font-size:14px;
      color:var(--muted);
    }

    #uploadPage{
      justify-content:flex-start;
      align-items:stretch;
      padding:0;
    }

    .upload-card{
      width:100%;
      max-width:none;
      min-height:100dvh;
      background:rgba(255,255,255,.58);
      border:none;
      backdrop-filter:blur(28px) saturate(1.08);
      -webkit-backdrop-filter:blur(28px) saturate(1.08);
      box-shadow:none;
      padding:28px 18px;
      text-align:center;
      display:flex;
      flex-direction:column;
      justify-content:center;
      position:relative;
      overflow:hidden;
      border-radius:0;
    }

    .upload-card::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(255,255,255,.55), rgba(255,255,255,.26));
      pointer-events:none;
    }

    .upload-card > *{
      position:relative;
      z-index:1;
    }

    .logo-wrap{
      display:inline-flex;
      width:76px;
      height:76px;
      border-radius:50%;
      align-items:center;
      justify-content:center;
      margin:0 auto 10px;
      background:linear-gradient(135deg, rgba(255,255,255,.82), rgba(255,255,255,.38));
      border:1px solid rgba(20,20,30,.06);
      box-shadow:0 10px 24px rgba(20,20,30,.06);
    }

    .logo-glow{
      font-size:36px;
      color:var(--accent);
      animation:pulse 2.8s ease-in-out infinite;
    }
    @keyframes pulse{
      0%,100%{transform:scale(1);filter:drop-shadow(0 0 0 rgba(230,178,122,0))}
      50%{transform:scale(1.07);filter:drop-shadow(0 0 16px rgba(230,178,122,.22))}
    }

    .app-title{
      font-size:40px;
      font-weight:800;
      letter-spacing:-.8px;
      line-height:1.05;
      background:linear-gradient(135deg,#1c2130 0%, #7b5d42 58%, #d89358 100%);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .app-sub{
      margin:8px 0 22px;
      color:var(--muted);
      font-size:15px;
      line-height:1.5;
    }

    .upload-area{
      border:1.5px dashed rgba(20,20,30,.11);
      background:rgba(255,255,255,.38);
      padding:34px 18px;
      cursor:pointer;
      transition:.25s ease;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.6);
    }
    .upload-area:hover{
      transform:translateY(-1px);
      border-color:rgba(230,178,122,.5);
      background:rgba(255,255,255,.56);
    }
    .upload-area.dragover{
      border-color:rgba(230,178,122,.85);
      background:rgba(255,255,255,.72);
    }

    .upload-icon{font-size:46px;margin-bottom:8px;}
    .upload-text{font-size:20px;font-weight:700;color:var(--text);}
    .upload-hint{margin-top:4px;font-size:14px;color:var(--muted);}

    .upload-formats{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .format-badge{
      padding:7px 16px;
      border-radius:999px;
      background:rgba(255,255,255,.56);
      border:1px solid rgba(20,20,30,.06);
      color:#55596d;
      font-size:12px;
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
    }

    #fileInput{display:none;}

    #resultPage{
      background:linear-gradient(180deg,#fbfaf6 0%, #f1ece2 100%);
      justify-content:flex-start;
      align-items:stretch;
    }

    .ad-space{
      width:100%;
      height:52px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#8c8f9c;
      font-size:12px;
      letter-spacing:1.3px;
      background:rgba(255,255,255,.30);
      border-bottom:1px solid var(--line-2);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      flex-shrink:0;
    }

    .result-header{
      width:100%;
      padding:12px 16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      background:rgba(255,255,255,.46);
      border-bottom:1px solid var(--line-2);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      flex-shrink:0;
    }

    .result-title{
      font-size:20px;
      font-weight:800;
      color:var(--text);
      letter-spacing:-.4px;
    }
    .result-title span{color:var(--accent);}
    .result-actions{display:flex;gap:8px;flex-wrap:wrap;}

    .btn{
      padding:11px 18px;
      border:none;
      cursor:pointer;
      border-radius:999px;
      font-family:inherit;
      font-weight:700;
      font-size:14px;
      transition:.22s ease;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      touch-action:manipulation;
      border:1px solid transparent;
    }
    .btn:active{transform:scale(.96);}

    .btn-primary{
      background:linear-gradient(135deg, #48c7ff, #2f8fff);
      color:#ffffff;
      box-shadow:
        0 10px 24px rgba(47, 143, 255, 0.22),
        0 0 18px rgba(72, 199, 255, 0.18);
      border:1px solid rgba(255,255,255,0.18);
    }
    .btn-primary:hover{
      transform:translateY(-1px);
      box-shadow:
        0 14px 30px rgba(47, 143, 255, 0.28),
        0 0 26px rgba(72, 199, 255, 0.24);
    }
    .btn-primary:active{
      transform:scale(0.96);
      box-shadow:
        0 8px 18px rgba(47, 143, 255, 0.20),
        0 0 14px rgba(72, 199, 255, 0.16);
    }

    .btn-secondary{
      background:rgba(255,255,255,.62);
      border-color:rgba(20,20,30,.07);
      color:var(--text);
    }
    .btn-secondary:hover{transform:translateY(-1px);}

    .compare-wrapper{
      flex:1;
      display:flex;
      flex-direction:column;
      min-height:0;
      overflow:hidden;
    }

    .compare-container{
      position:relative;
      flex:1;
      min-height:0;
      overflow:hidden;
      background:radial-gradient(circle at center, rgba(255,255,255,.94), rgba(240,235,224,.88));
      touch-action:none;
    }

    .compare-container img,
    .compare-container canvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:contain;
      touch-action:none;
    }

    .before-layer{
      z-index:1;
      filter:saturate(1.01) contrast(.98);
    }

    .after-layer{
      z-index:2;
      clip-path:inset(0 50% 0 0);
    }

    .slider-line{
      position:absolute;
      top:0;
      left:50%;
      width:2px;
      height:100%;
      background:linear-gradient(180deg, rgba(255,255,255,.96), rgba(230,178,122,.92));
      z-index:10;
      transform:translateX(-50%);
      pointer-events:none;
      box-shadow:0 0 18px rgba(230,178,122,.24);
    }

    .slider-handle{
      position:absolute;
      top:50%;
      left:50%;
      width:46px;
      height:46px;
      transform:translate(-50%,-50%);
      z-index:11;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:50%;
      background:rgba(255,255,255,.94);
      border:1px solid rgba(20,20,30,.08);
      box-shadow:0 10px 26px rgba(20,20,30,.12);
      pointer-events:none;
      color:var(--accent);
      font-weight:900;
      font-size:18px;
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
    }

    .slider-input{
      position:absolute;
      left:50%;
      bottom:18px;
      transform:translateX(-50%);
      width:min(92%,720px);
      z-index:12;
      height:5px;
      background:rgba(20,20,30,.08);
      border-radius:999px;
      -webkit-appearance:none;
      appearance:none;
      outline:none;
      opacity:.76;
      transition:opacity .2s ease;
      touch-action:none;
    }
    .slider-input:hover{opacity:1;}
    .slider-input::-webkit-slider-thumb{
      -webkit-appearance:none;
      width:22px;
      height:22px;
      border-radius:50%;
      background:linear-gradient(135deg,#5ad0ff,#2f8fff);
      border:2px solid rgba(255,255,255,.82);
      box-shadow:0 8px 18px rgba(47,143,255,.30), 0 0 18px rgba(90,208,255,.20);
      cursor:pointer;
    }
    .slider-input::-moz-range-thumb{
      width:22px;
      height:22px;
      border-radius:50%;
      background:linear-gradient(135deg,#5ad0ff,#2f8fff);
      border:none;
      cursor:pointer;
    }

    .compare-labels{
      display:flex;
      justify-content:space-between;
      padding:11px 16px;
      font-size:12px;
      color:var(--muted);
      background:rgba(255,255,255,.34);
      border-top:1px solid var(--line-2);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      flex-shrink:0;
    }
    .before-label{color:#6e7284;}
    .after-label{color:var(--accent);font-weight:700;}

    .download-section{
      width:100%;
      display:flex;
      gap:12px;
      padding:14px 16px 18px;
      background:rgba(255,255,255,.48);
      border-top:1px solid var(--line-2);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      flex-shrink:0;
    }
    .download-section .btn{
      flex:1;
      min-width:0;
      padding:13px 16px;
      font-size:14px;
    }
    .btn-back{
      background:rgba(255,255,255,.62);
      border-color:rgba(20,20,30,.07);
      color:var(--text);
    }

    @media (max-width:640px){
      .upload-card{padding:28px 16px 22px;}
      .app-title{font-size:32px;}
      .upload-area{padding:28px 14px;}
      .upload-icon{font-size:40px;}
      .result-title{font-size:17px;}
      .btn{font-size:12px;padding:9px 14px;}
      .slider-handle{width:40px;height:40px;font-size:15px;}
      .slider-input{bottom:14px;}
      .ad-space{height:44px;font-size:10px;}
    }

    @media (max-width:430px){
      .result-header{padding:10px 12px;flex-wrap:wrap;}
      .result-actions{width:100%;justify-content:flex-end;}
      .download-section{flex-wrap:wrap;}
      .download-section .btn{flex:1 1 140px;}
    }
  </style>
</head>
<body>
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text">PurePixel-Pro</div>
    <div class="loading-sub">Eye-friendly premium processing</div>
  </div>

  <div class="page active" id="uploadPage">
    <div class="upload-card">
      <div class="logo-wrap"><span class="logo-glow">✦</span></div>
      <div class="app-title">PurePixel-Pro</div>
      <div class="app-sub">Soft white glass editor · edge-to-edge full screen UI</div>

      <div class="upload-area" id="uploadArea">
        <div class="upload-icon">🖼</div>
        <div class="upload-text">ছবি আপলোড করুন</div>
        <div class="upload-hint">ক্লিক বা ড্র্যাগ করুন</div>
        <div class="upload-formats">
          <span class="format-badge">JPG</span>
          <span class="format-badge">PNG</span>
          <span class="format-badge">WEBP</span>
        </div>
        <input type="file" id="fileInput" accept="image/*" />
      </div>

      <div style="margin-top:18px;color:var(--muted);font-size:13px;line-height:1.6;">
        ✨ Vibrance · Contrast · Skin tone · Premium polish
      </div>
    </div>
  </div>

  <div class="page" id="resultPage">
    <div class="ad-space"><span>⚡ AD SPACE</span></div>
    <div class="result-header">
      <div class="result-title"><span>বিফর</span> ↔ <span>আফটার</span></div>
      <div class="result-actions">
        <button class="btn btn-secondary" id="newPhotoBtn">✦ নতুন</button>
      </div>
    </div>

    <div class="compare-wrapper">
      <div class="compare-container" id="compareContainer">
        <img id="beforeImage" class="before-layer" alt="আসল ছবি" />
        <canvas id="afterCanvas" class="after-layer"></canvas>
        <div class="slider-line" id="sliderLine"></div>
        <div class="slider-handle" id="sliderHandle">⟷</div>
        <input type="range" class="slider-input" id="sliderInput" min="0" max="100" value="50" />
      </div>
      <div class="compare-labels">
        <span class="before-label">◀ আসল</span>
        <span>স্লাইড করুন</span>
        <span class="after-label">PurePixel-Pro ▶</span>
      </div>
    </div>

    <div class="download-section">
      <button class="btn btn-primary" id="downloadBtn">⬇ ডাউনলোড</button>
      <button class="btn btn-back" id="backBtn">← ব্যাক</button>
    </div>
  </div>

  <script>
    (function(){
      'use strict';

      const uploadPage = document.getElementById('uploadPage');
      const resultPage = document.getElementById('resultPage');
      const uploadArea = document.getElementById('uploadArea');
      const fileInput = document.getElementById('fileInput');
      const loadingOverlay = document.getElementById('loadingOverlay');
      const beforeImage = document.getElementById('beforeImage');
      const afterCanvas = document.getElementById('afterCanvas');
      const sliderInput = document.getElementById('sliderInput');
      const sliderLine = document.getElementById('sliderLine');
      const sliderHandle = document.getElementById('sliderHandle');
      const downloadBtn = document.getElementById('downloadBtn');
      const newPhotoBtn = document.getElementById('newPhotoBtn');
      const backBtn = document.getElementById('backBtn');

      let processedDataUrl = null;

      function applyPurePixelPro(imageData){
        const data = imageData.data;
        const w = imageData.width;
        const h = imageData.height;

        const satBoost = 1.12;
        const vibBoost = 1.2;
        const contrastFactor = 1.1;
        const highlightCompress = 0.74;
        const clarityBoost = 1.06;
        const texBoost = 1.03;
        const vigStrength = 0.07;
        const vigFeather = 0.92;

        for(let i=0;i<data.length;i+=4){
          let r=data[i], g=data[i+1], b=data[i+2];
          let rn=r/255, gn=g/255, bn=b/255;

          rn=((rn-0.5)*contrastFactor)+0.5;
          gn=((gn-0.5)*contrastFactor)+0.5;
          bn=((bn-0.5)*contrastFactor)+0.5;

          const lum=0.299*rn+0.587*gn+0.114*bn;
          const sat=Math.sqrt((rn-lum)**2+(gn-lum)**2+(bn-lum)**2);
          const vibFactor=1+(vibBoost-1)*(1-Math.min(sat*2.2,1));
          const finalSat=satBoost*vibFactor;

          rn=lum+finalSat*(rn-lum);
          gn=lum+finalSat*(gn-lum);
          bn=lum+finalSat*(bn-lum);

          if(rn<0.35) rn += (0.035*(0.35-rn)/0.35);
          if(gn<0.35) gn += (0.035*(0.35-gn)/0.35);
          if(bn<0.35) bn += (0.035*(0.35-bn)/0.35);

          if(rn>0.82) rn=0.82+(rn-0.82)*highlightCompress;
          if(gn>0.82) gn=0.82+(gn-0.82)*highlightCompress;
          if(bn>0.82) bn=0.82+(bn-0.82)*highlightCompress;

          if(rn>gn && gn>bn && (rn-gn)<0.16 && (gn-bn)<0.22){
            const skinSat=Math.sqrt((rn-lum)**2+(gn-lum)**2+(bn-lum)**2);
            if(skinSat>0.13){
              const scale=0.13/skinSat;
              rn=lum+scale*(rn-lum);
              gn=lum+scale*(gn-lum);
              bn=lum+scale*(bn-lum);
            }
          }

          const mid=0.5;
          rn = mid + clarityBoost * (rn - mid);
          gn = mid + clarityBoost * (gn - mid);
          bn = mid + clarityBoost * (bn - mid);
          rn = mid + texBoost * (rn - mid);
          gn = mid + texBoost * (gn - mid);
          bn = mid + texBoost * (bn - mid);

          rn=Math.min(1,Math.max(0,rn));
          gn=Math.min(1,Math.max(0,gn));
          bn=Math.min(1,Math.max(0,bn));

          data[i]=Math.round(rn*255);
          data[i+1]=Math.round(gn*255);
          data[i+2]=Math.round(bn*255);
        }

        const cx=w/2, cy=h/2, maxD=Math.sqrt(cx*cx+cy*cy);
        for(let y=0;y<h;y++){
          for(let x=0;x<w;x++){
            const idx=(y*w+x)*4;
            const dx=x-cx, dy=y-cy;
            const nd=Math.sqrt(dx*dx+dy*dy)/maxD;
            let vf=1-vigStrength*Math.pow(nd,1.5)*(1-vigFeather*0.5);
            vf=Math.min(1,Math.max(0.88,vf));
            data[idx]=Math.round(data[idx]*vf);
            data[idx+1]=Math.round(data[idx+1]*vf);
            data[idx+2]=Math.round(data[idx+2]*vf);
          }
        }
        return imageData;
      }

      async function processImage(img){
        return new Promise((resolve)=>{
          const canvas=document.createElement('canvas');
          const ctx=canvas.getContext('2d');
          let w=img.width, h=img.height;
          const maxDim=1800;
          if(w>maxDim||h>maxDim){
            const ratio=Math.min(maxDim/w,maxDim/h);
            w=Math.floor(w*ratio);
            h=Math.floor(h*ratio);
          }
          canvas.width=w;
          canvas.height=h;
          ctx.drawImage(img,0,0,w,h);
          const imageData=ctx.getImageData(0,0,w,h);
          const processed=applyPurePixelPro(imageData);
          ctx.putImageData(processed,0,0);
          resolve(canvas);
        });
      }

      function switchPage(page){
        document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
        page.classList.add('active');
      }

      function updateSlider(value){
        const p=Number(value);
        afterCanvas.style.clipPath=`inset(0 ${100-p}% 0 0)`;
        sliderLine.style.left=p+'%';
        sliderHandle.style.left=p+'%';
      }

      async function handleImage(file){
        if(!file || !file.type.startsWith('image/')){
          alert('দয়া করে একটি ছবি নির্বাচন করুন');
          return;
        }
        loadingOverlay.classList.add('show');
        const reader=new FileReader();
        reader.onload=async(e)=>{
          const img=new Image();
          img.onload=async()=>{
            try{
              beforeImage.src=e.target.result;
              const processedCanvas=await processImage(img);
              const ctx=afterCanvas.getContext('2d');
              afterCanvas.width=processedCanvas.width;
              afterCanvas.height=processedCanvas.height;
              ctx.drawImage(processedCanvas,0,0);
              processedDataUrl=processedCanvas.toDataURL('image/jpeg',0.96);
              loadingOverlay.classList.remove('show');
              switchPage(resultPage);
              sliderInput.value=50;
              updateSlider(50);
            }catch(err){
              console.error(err);
              alert('প্রসেসিং এ সমস্যা হয়েছে');
              loadingOverlay.classList.remove('show');
            }
          };
          img.src=e.target.result;
        };
        reader.readAsDataURL(file);
      }

      sliderInput.addEventListener('input',e=>updateSlider(e.target.value));
      sliderInput.addEventListener('touchmove',(e)=>{
        const rect=sliderInput.getBoundingClientRect();
        const x=e.touches[0].clientX-rect.left;
        const p=Math.min(100,Math.max(0,(x/rect.width)*100));
        sliderInput.value=p;
        updateSlider(p);
      },{passive:true});

      downloadBtn.addEventListener('click',()=>{
        if(!processedDataUrl){alert('কোনো ছবি প্রসেস করা হয়নি'); return;}
        const link=document.createElement('a');
        link.download=`PurePixel_Pro_${Date.now()}.jpg`;
        link.href=processedDataUrl;
        link.click();
      });

      function resetToUpload(){
        switchPage(uploadPage);
        fileInput.value='';
        processedDataUrl=null;
        beforeImage.src='';
        const ctx=afterCanvas.getContext('2d');
        ctx.clearRect(0,0,afterCanvas.width,afterCanvas.height);
      }

      newPhotoBtn.addEventListener('click',resetToUpload);
      backBtn.addEventListener('click',resetToUpload);

      uploadArea.addEventListener('click',()=>fileInput.click());
      uploadArea.addEventListener('dragover',(e)=>{e.preventDefault(); uploadArea.classList.add('dragover');});
      uploadArea.addEventListener('dragleave',()=>uploadArea.classList.remove('dragover'));
      uploadArea.addEventListener('drop',(e)=>{
        e.preventDefault();
        uploadArea.classList.remove('dragover');
        if(e.dataTransfer.files.length){
          fileInput.files=e.dataTransfer.files;
          handleImage(e.dataTransfer.files[0]);
        }
      });

      fileInput.addEventListener('change',(e)=>{
        if(e.target.files.length) handleImage(e.target.files[0]);
      });

      document.addEventListener('keydown',(e)=>{
        if(e.key==='Enter' && resultPage.classList.contains('active')) downloadBtn.click();
        if((e.key==='r'||e.key==='R') && resultPage.classList.contains('active')) newPhotoBtn.click();
        if(e.key==='Escape' && resultPage.classList.contains('active')) backBtn.click();
      });

      document.addEventListener('gesturestart',e=>e.preventDefault());
      document.addEventListener('gesturechange',e=>e.preventDefault());
      document.addEventListener('gestureend',e=>e.preventDefault());
    })();
  </script>
</body>
</html>
